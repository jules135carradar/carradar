name: Scraper AutoScout24

on:
  schedule:
    - cron: '0 3 * * *'  # Chaque nuit à 3h du matin (heure UTC = 4h en France)
  workflow_dispatch:      # Permet aussi de lancer manuellement depuis GitHub

jobs:
  scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Installer Chromium pour Playwright
        run: npx playwright install chromium --with-deps

      - name: Lancer le scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: node scripts/scraper-lbc.js
